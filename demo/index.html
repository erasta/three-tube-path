<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>TubePath on three.js</title>
  <link rel="shortcut icon" href="#">
  <style>
    body { margin: 0; }
    #controls {
      position: fixed;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 10px;
      border-radius: 6px;
      font: 13px/1.8 sans-serif;
      z-index: 999;
    }
    #controls label { display: flex; align-items: center; gap: 6px; }
    #controls input[type=range] { width: 100px; }
    #controls button { margin-top: 4px; cursor: pointer; }
  </style>
</head>

<body>
  <div id="controls">
    <label>Points <input type="range" id="numberOfPoints" min="2" max="10" step="1" value="5"><span id="numberOfPoints-val">5</span></label>
    <label>Radial <input type="range" id="radialSegments" min="3" max="24" step="1" value="8"><span id="radialSegments-val">8</span></label>
    <label>Elbow N <input type="range" id="elbowNum" min="0" max="10" step="1" value="3"><span id="elbowNum-val">3</span></label>
    <label>Elbow Off <input type="range" id="elbowOffset" min="0.01" max="1" step="0.01" value="0.33"><span id="elbowOffset-val">0.33</span></label>
    <label>Radius <input type="range" id="radius" min="0.1" max="5" step="0.01" value="1"><span id="radius-val">1</span></label>
    <label>Wireframe <input type="checkbox" id="wireframe" checked></label>
    <button id="randomize">Randomize</button>
  </div>

  <script type="module" src="app.ts"></script>

  <a id="button" target="_blank" style="position: fixed; bottom: 16px; right: 16px; padding: 12px; border-radius: 50%;
     background-color: #FFF; opacity: .9; z-index: 999; box-shadow: 0 0 4px rgb(0 0 0 / 15%); text-decoration: none;"
    href="https://github.com/erasta/three-tube-path/blob/main/demo/app.ts" title="View source code on GitHub">
    <img src="../files/ic_code_black_24dp.svg" />
  </a>
</body>

</html>
